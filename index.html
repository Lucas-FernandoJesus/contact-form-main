<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Contact form</title>
    <link rel="stylesheet" href="./assets/index.css" />
  </head>

  <body>
    <div class="content">
      <form class="forms">
        <h1>Contact Us</h1>
        <div class="inputs">
          <ul>
            <li>
              <label for="name">First Name *</label><br />
              <input type="text" required />
            </li>
            <li>
              <label for="name">Last Name *</label><br />
              <input type="text" required />
            </li>
          </ul>
        </div>

        <!-- This field is required  This field is required  -->
        <div class="email">
          <label for="name">Email Address *</label>
          <input type="email" required />
        </div>
        <!-- Please enter a valid email address This field is
      required -->

        <div class="query">
          <label for="">Query Type *</label>
          <div class="query-inputs">
            <ul class="query-inputs">
              <li>
                <input type="radio" name="" id="" required />
                <label for="">General Enquiry</label>
              </li>
              <li>
                <input type="radio" name="" id="" required />
                <label for="">Support Request</label>
              </li>
            </ul>
          </div>
          <!-- Please select a query type-->
        </div>

        <div class="message">
          <label class="message-label">Message *</label>
          <input class="message-input" type="text" required />
          <!-- This field is required -->
        </div>

        <div class="check-box">
          <input type="checkbox" name="" id="" required />
          <label for="">I consent to being contacted by the team</label>
        </div>

        <!-- To submit this form, please consent to being contacted Submit Message Sent!
      Thanks for completing the form. We'll be in touch soon! -->
        <input class="submit" type="button" value="Submit" />
      </form>
    </div>

  </div> -->
  </body>
</html>
