<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Contact form</title>
    <link rel="stylesheet" href="./assets/index.css" />
  </head>

  <body>
    <div class="content">
      <!-- Mensagem geral de feedback -->
      <span id="msg"></span>

      <form class="forms" id="form-validation">
        <h1>Contact Us</h1>

        <div class="inputs">
          <ul>
            <li>
              <label for="input-primeiro-nome">First Name *</label><br />
              <input
                type="text"
                class="input-validation"
                name="primeiro-nome"
                id="input-primeiro-nome"
              />
              <span class="error" id="error-primeiro-nome"></span>
            </li>
            <li>
              <label for="input-ultimo-nome">Last Name *</label><br />
              <input
                type="text"
                class="input-validation"
                name="ultimo-nome"
                id="input-ultimo-nome"
              />
              <span class="error" id="error-ultimo-nome"></span>
            </li>
          </ul>
        </div>

        <div class="email">
          <label for="input-email">Email Address *</label>
          <input
            type="email"
            class="input-validation"
            name="email"
            id="input-email"
          />
          <span class="error" id="error-email"></span>
        </div>

        <fieldset>
          <legend>Query Type *</legend>
          <ul class="query-inputs">
            <li>
              <input
                type="radio"
                id="opcao-geral"
                name="query-type"
                value="general"
                
              <label for="opcao-geral">General Enquiry</label>
            </li>
            <li>
              <input
                type="radio"
                id="opcao-suporte"
                name="query-type"
                value="support"
                
              <label for="opcao-suporte">Support Request</label>
            </li>
          </ul>
          <span class="error" id="error-query-type"></span>
        </fieldset>

        <div class="message">
          <label for="input-message">Message *</label>
          <textarea
            id="input-message"
            name="message"
            class="message-input"
          ></textarea>
          <span class="error" id="error-message"></span>
        </div>

        <div class="check-box">
          <input type="checkbox" name="terms" 
            >I consent to being contacted by the team</label
          >
          <span class="error" id="error-terms"></span>
        </div>

        <input class="submit" type="submit" value="submit" />
      </form>
    </div>

    <script src="./assets/index.js"></script>
  </body>
</html>
